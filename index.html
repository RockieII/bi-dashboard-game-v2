<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BI Dashboard — v2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <span id="top-bar-title">BI Dashboard <span id="version-badge">v2</span></span>
      <div id="top-bar-actions">
        <button id="achieve-btn" title="Achievements">🏆 Achievements</button>
        <button id="log-btn" title="Activity Log">📋 Log</button>
        <button id="status-btn" title="Status Report">📊 Status</button>
        <button id="settings-btn" title="Settings">⚙ Settings</button>
      </div>
    </div>
    <div id="kpi-bar"></div>
    <div id="content">
      <div id="dashboard"></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="game.js"></script>
</body>
</html>
